<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>User Management</title>

    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(to right, #eef2f3, #dfe9f3);
            margin: 0;
            padding: 20px;
        }

        h2 {
            text-align: center;
            color: #333;
        }

        .container {
            max-width: 800px;
            margin: auto;
            background: #ffffff;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.1);
        }

        form {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: center;
        }

        input {
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 8px;
            flex: 1;
            min-width: 150px;
            transition: 0.3s;
        }

        input:focus {
            border-color: #4facfe;
            outline: none;
            box-shadow: 0 0 5px rgba(79,172,254,0.5);
        }

        button {
            padding: 10px 15px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.3s;
        }

        button[type="submit"] {
            background: #4facfe;
            color: white;
        }

        button[type="submit"]:hover {
            background: #00c6ff;
        }

        table {
            width: 100%;
            margin-top: 25px;
            border-collapse: collapse;
            overflow: hidden;
            border-radius: 10px;
        }

        th {
            background: #4facfe;
            color: white;
            padding: 12px;
        }

        td {
            padding: 10px;
            text-align: center;
            border-bottom: 1px solid #eee;
        }

        tr:hover {
            background: #f5faff;
        }

        .delete-btn {
            background: #ff6b6b;
            color: white;
        }

        .delete-btn:hover {
            background: #ff4b4b;
        }

        @media (max-width: 600px) {
            form {
                flex-direction: column;
            }
        }
    </style>
</head>

<body>

<div class="container">
    <h2>👤 User Management</h2>

    <form id="userForm">
        <input type="text" name="name" placeholder="Enter Name" required>
        <input type="email" name="email" placeholder="Enter Email" required>
        <button type="submit">Add User</button>
    </form>

    <table>
        <tr>
            <th>ID</th>
            <th>Name</th>
            <th>Email</th>
            <th>Actions</th>
        </tr>

        {% for user in users %}
        <tr>
            <td>{{ user.id }}</td>
            <td>{{ user.name }}</td>
            <td>{{ user.email }}</td>
            <td>
                <button class="delete-btn" onclick="deleteUser({{ user.id }})">
                    Delete
                </button>
            </td>
        </tr>
        {% endfor %}
    </table>
</div>

<script>
document.getElementById("userForm").onsubmit = function(e) {
    e.preventDefault();

    let formData = new FormData(this);

    fetch("/add-user", {
        method: "POST",
        body: formData
    }).then(() => location.reload());
};

function deleteUser(id) {
    fetch("/delete-user/" + id, {
        method: "POST"
    }).then(() => location.reload());
}
</script>

</body>
</html>
